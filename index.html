<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>皮皮助手</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --bubble-user: #2a2a2a;
  --bubble-ai: #1e1e2e;
  --text: #e4e4e4;
  --text-dim: #888;
  --accent: #7c6aef;
  --accent-glow: rgba(124, 106, 239, 0.3);
  --radius: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
  flex-shrink: 0;
}

.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-info h1 {
  font-size: 16px; font-weight: 600;
}

.header-info p {
  font-size: 11px; color: var(--text-dim);
}

.header-actions {
  margin-left: auto;
  display: flex; gap: 8px;
}

.header-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 6px;
  border-radius: 8px; transition: all 0.2s;
}
.header-btn:active { background: rgba(255,255,255,0.08); }

/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.chat::-webkit-scrollbar { width: 0; }

/* Messages */
.msg {
  max-width: 82%;
  animation: msgIn 0.3s ease;
  display: flex;
  flex-direction: column;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; }
.msg.ai { align-self: flex-start; }

.msg .bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg.user .bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 6px;
}

.msg.ai .bubble {
  background: var(--bubble-ai);
  border-bottom-left-radius: 6px;
}

.msg .time {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  padding: 0 4px;
}

.msg.user .time { text-align: right; }

/* Typing indicator */
.typing {
  display: none;
  align-self: flex-start;
  padding: 12px 16px;
  background: var(--bubble-ai);
  border-radius: var(--radius);
  border-bottom-left-radius: 6px;
  gap: 5px;
  align-items: center;
}

.typing.show { display: flex; }

.typing span {
  width: 7px; height: 7px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Welcome */
.welcome {
  text-align: center;
  padding: 40px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.welcome .big-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 0 40px var(--accent-glow);
}

.welcome h2 { font-size: 20px; font-weight: 600; }
.welcome p { font-size: 13px; color: var(--text-dim); max-width: 260px; }

/* Input bar */
.input-bar {
  padding: 10px 12px calc(var(--safe-bottom) + 10px);
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.input-bar textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 22px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.4;
  transition: border-color 0.2s;
}

.input-bar textarea:focus {
  border-color: var(--accent);
}

.input-bar textarea::placeholder { color: var(--text-dim); }

.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  opacity: 0.5;
}

.send-btn.active { opacity: 1; }
.send-btn:active { transform: scale(0.9); }

/* Mic button */
.mic-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.mic-btn:active { transform: scale(0.9); }

.mic-btn.recording {
  background: #ef4444;
  border-color: #ef4444;
  color: #fff;
  animation: micPulse 1.2s infinite;
}

@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
  50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
}

/* Voice hint */
.voice-hint {
  display: none;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: var(--text-dim);
  animation: fadeIn 0.3s ease;
}

.voice-hint.show { display: block; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Settings panel */
.settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  backdrop-filter: blur(4px);
}

.settings-overlay.show { display: flex; align-items: flex-end; }

.settings-panel {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-height: 70vh;
  overflow-y: auto;
}

.settings-panel h3 {
  font-size: 17px; margin-bottom: 16px;
}

.settings-panel label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  margin-top: 14px;
}

.settings-panel input {
  width: 100%;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  font-family: monospace;
}

.settings-panel input:focus { border-color: var(--accent); }

.settings-panel .btn-row {
  display: flex; gap: 10px; margin-top: 20px;
}

.settings-panel button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-save { background: var(--accent); color: #fff; }
.btn-clear { background: rgba(255,80,80,0.15); color: #ff6b6b; }
.btn-cancel { background: rgba(255,255,255,0.08); color: var(--text); }

/* Install banner */
.install-banner {
  display: none;
  padding: 10px 16px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
}

.install-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🐾</div>
  <div class="header-info">
    <h1>皮皮助手</h1>
    <p id="statusText">在线 · 随时待命</p>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleSettings()" title="设置">⚙️</button>
  </div>
</div>

<div class="install-banner" id="installBanner" onclick="installPWA()">
  📲 添加到主屏幕，像 App 一样使用
</div>

<div class="chat" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="big-avatar">🐾</div>
    <h2>你好，我是皮皮</h2>
    <p>你的 AI 助手，随时待命。有什么需要帮忙的？</p>
  </div>
</div>

<div class="typing" id="typing">
  <span></span><span></span><span></span>
</div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="说点什么..." 
    oninput="autoResize(this); toggleSendBtn()" 
    onkeydown="handleKey(event)"></textarea>
  <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
  <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
</div>
<div class="voice-hint" id="voiceHint">正在聆听...</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <label>API Key（智谱 AI）</label>
    <input type="password" id="apiKeyInput" placeholder="粘贴你的 API Key">
    <label>模型</label>
    <input type="text" id="modelInput" placeholder="glm-4-flash" value="glm-4-flash">
    <div class="btn-row">
      <button class="btn-cancel" onclick="toggleSettings()">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
    <div class="btn-row">
      <button class="btn-clear" onclick="clearChat()">清空聊天记录</button>
    </div>
  </div>
</div>

<script>
// Config
const DEFAULT_KEY = '68ede0ea9c0f471483ba659705876f53.dbjeKBZzyNwnVyPx';
const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';

let apiKey = localStorage.getItem('pipi_api_key') || DEFAULT_KEY;
let model = localStorage.getItem('pipi_model') || 'glm-4-flash';
let messages = JSON.parse(localStorage.getItem('pipi_messages') || '[]');
let isGenerating = false;

// Init
document.getElementById('apiKeyInput').value = apiKey;
document.getElementById('modelInput').value = model;
renderMessages();

// Auto resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('input');
  btn.classList.toggle('active', input.value.trim().length > 0);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// Send message
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  addMessage('user', text);
  input.value = '';
  autoResize(input);
  toggleSendBtn();

  // Show typing
  isGenerating = true;
  document.getElementById('typing').classList.add('show');
  document.getElementById('statusText').textContent = '正在思考...';
  scrollToBottom();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: '你是皮皮，一个友好、直接、有主见的 AI 助手。你说话简洁有力，不废话，不拍马屁。你 genuinely 帮助用户解决问题。' },
          ...messages.slice(-20)
        ]
      })
    });

    const data = await response.json();

    if (data.error) {
      addMessage('ai', `⚠️ API 错误：${data.error.message}`);
    } else {
      const reply = data.choices[0].message.content;
      addMessage('ai', reply);
    }
  } catch (err) {
    addMessage('ai', `⚠️ 网络错误：${err.message}`);
  }

  isGenerating = false;
  document.getElementById('typing').classList.remove('show');
  document.getElementById('statusText').textContent = '在线 · 随时待命';
}

function addMessage(role, content) {
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  
  messages.push({ role, content, time });
  localStorage.setItem('pipi_messages', JSON.stringify(messages));

  const chat = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div><div class="time">${time}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMessages() {
  if (messages.length === 0) return;
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chatArea');
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = `msg ${m.role}`;
    div.innerHTML = `<div class="bubble">${escapeHtml(m.content)}</div><div class="time">${m.time || ''}</div>`;
    chat.appendChild(div);
  });
  scrollToBottom();
}

function scrollToBottom() {
  const chat = document.getElementById('chatArea');
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

// Settings
function toggleSettings() {
  document.getElementById('settingsOverlay').classList.toggle('show');
}

function closeSettings(e) {
  if (e.target === e.currentTarget) toggleSettings();
}

function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim() || DEFAULT_KEY;
  model = document.getElementById('modelInput').value.trim() || 'glm-4-flash';
  localStorage.setItem('pipi_api_key', apiKey);
  localStorage.setItem('pipi_model', model);
  toggleSettings();
}

function clearChat() {
  if (confirm('确定清空所有聊天记录？')) {
    messages = [];
    localStorage.removeItem('pipi_messages');
    const chat = document.getElementById('chatArea');
    chat.innerHTML = `<div class="welcome" id="welcome">
      <div class="big-avatar">🐾</div>
      <h2>你好，我是皮皮</h2>
      <p>你的 AI 助手，随时待命。有什么需要帮忙的？</p>
    </div>`;
    toggleSettings();
  }
}

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Voice input
let recognition = null;
let isRecording = false;
let voiceText = '';
let voiceDebug = [];

function voiceLog(msg) {
  voiceDebug.push(msg);
  console.log('[Voice]', msg);
  const hint = document.getElementById('voiceHint');
  hint.textContent = msg;
  hint.classList.add('show');
}

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceLog('检测语音API: ' + (SR ? '支持' : '不支持'));
  if (!SR) return null;
  
  const rec = new SR();
  rec.lang = 'zh-CN';
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  
  voiceLog('语音API已初始化');
  
  rec.onstart = () => {
    voiceLog('🎤 录音已开始，请说话...');
  };
  
  rec.onresult = (e) => {
    let transcript = '';
    let isFinal = false;
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
      if (e.results[i].isFinal) isFinal = true;
    }
    const input = document.getElementById('input');
    input.value = (voiceText + ' ' + transcript).trim();
    autoResize(input);
    toggleSendBtn();
    voiceLog('识别到: ' + transcript + (isFinal ? ' ✓' : ' ...'));
  };
  
  rec.onend = () => {
    voiceLog('录音结束 (isRecording=' + isRecording + ')');
    if (isRecording) {
      const input = document.getElementById('input');
      if (input.value.trim()) {
        voiceText = input.value;
        voiceLog('继续聆听...');
        setTimeout(() => {
          try { recognition.start(); } catch(e) { voiceLog('重启失败: ' + e.message); stopVoice(); }
        }, 300);
      } else {
        voiceLog('未检测到语音，再试一次...');
        setTimeout(() => {
          try { recognition.start(); } catch(e) { voiceLog('重启失败: ' + e.message); stopVoice(); }
        }, 300);
      }
    }
  };
  
  rec.onerror = (e) => {
    voiceLog('错误: ' + e.error);
    if (e.error === 'not-allowed') {
      voiceLog('❌ 请允许麦克风权限后重试');
      stopVoice();
    } else if (e.error === 'no-speech') {
      if (isRecording) {
        setTimeout(() => {
          try { recognition.start(); } catch(e2) { stopVoice(); }
        }, 300);
      }
    } else if (e.error === 'audio-capture') {
      voiceLog('❌ 找不到麦克风');
      stopVoice();
    } else {
      stopVoice();
    }
  };
  
  return rec;
}

function toggleVoice() {
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  voiceDebug = [];
  if (!recognition) recognition = initVoice();
  if (!recognition) {
    voiceLog('❌ 浏览器不支持语音输入，请用Chrome');
    return;
  }
  
  voiceText = document.getElementById('input').value;
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('statusText').textContent = '🎤 聆听中...';
  
  try {
    recognition.start();
  } catch(e) {
    voiceLog('启动失败: ' + e.message);
    stopVoice();
  }
}

function stopVoice() {
  isRecording = false;
  voiceText = '';
  try { if (recognition) recognition.stop(); } catch(e) {}
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('voiceHint').classList.remove('show');
  document.getElementById('statusText').textContent = '在线 · 随时待命';
}
</script>
</body>
</html>
